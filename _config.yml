# Site settings
title: my place
description: >-
    I am writing to share and document what I have learned in journey through software.<a href="https://github.com/sagarc03" target="_blank" rel="noopener">@github</a>.
lang: en-US
timezone: America/New_York

# Profile settings
author:
  name: sagar chavan
  bio: >-
      Welcome to my place on the internet. This place has my dev stuff, things I like, projects I am working on and some random thoughts. I hope you enjoy your stay.
  username: sagarc03
  email: sagar.c.03@gmail.com
  avatar: /assets/img/avatar.jpg

# Url settings
url: "https://sagarc03.github.io"
baseurl:
permalink: /:title/
google_analytics:
fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Build settings
sass:
  style: compressed

include:
  - _redirects
  - .htaccess

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules
  - CODE_OF_CONDUCT.md

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sass-converter
  - jekyll-sitemap
